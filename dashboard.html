<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eze-ho - Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body class="app-body">

  <header class="app-header">
    <div class="header-brand">
      <span class="logo-icon">📦</span>
      <span class="brand-name">Eze-ho</span>
    </div>
    <div class="header-right">
      <div class="credit-badge"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:2px; vertical-align: middle;"><circle cx="12" cy="12" r="10"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 18V6"/></svg> <span id="creditDisplay">0</span> Credits</div>
      <div class="user-info">
        <span id="userNameDisplay"></span>
        <small id="userEmailDisplay"></small>
      </div>
      <button class="btn-logout" onclick="handleLogout()">Logout</button>
    </div>
  </header>

  <main class="app-main">
    <section class="card form-card">
      <h2>New Submission</h2>
      <form id="submissionForm" onsubmit="handleSubmit(event)">
        <div class="form-row">
          <div class="form-group">
            <label>Username <span class="required">*</span></label>
            <input type="text" id="fieldUsername" placeholder="Enter username" required />
          </div>
          <div class="form-group">
            <label>Password <span class="required">*</span></label>
            <div class="password-wrapper">
              <input type="password" id="fieldPassword" placeholder="Enter password" autocomplete="off" required />
              <button type="button" class="toggle-password" onclick="togglePassword('fieldPassword')">👁️</button>
            </div>
          </div>
        </div>
        <div class="form-group">
          <label>Received By <span class="required">*</span></label>
          <input type="text" id="fieldReceivedBy" placeholder="Enter received by" required />
        </div>
        <div class="form-group">
          <label>Attach Files <span style="color:var(--muted);font-weight:400">(required · max 500 · 5MB each)</span> <span class="required">*</span></label>
          <div class="file-drop-area" id="fileDropArea">
            <span>Click to select or drag files here</span>
            <small>JPG, PNG, PDF, DOC, TXT</small>
            <input type="file" id="fileInput" multiple accept=".jpg,.jpeg,.png,.pdf,.doc,.docx,.txt" style="display:none" onchange="handleFileSelect(this)" />
          </div>
          <div id="fileList" class="file-list"></div>
        </div>
        <div id="progressWrapper" class="progress-wrapper" style="display:none">
          <div class="progress-bar-track"><div class="progress-bar-fill" id="progressFill"></div></div>
          <span id="progressText">0%</span>
        </div>
        <div id="submitError" style="display:none;background:rgba(239,68,68,0.1);border:1px solid var(--danger);border-radius:8px;padding:12px 14px;margin-bottom:12px;color:var(--danger);font-size:0.88rem;line-height:1.5"></div>
        <button type="submit" class="btn-primary" id="submitBtn">🚀 Submit</button>
      </form>
    </section>

    <section class="card">
      <h2>My Submissions</h2>
      <div id="submissionsList"><div class="loading-spinner">Loading...</div></div>
    </section>
  </main>

  <!-- No Credits Modal -->
  <div id="noCreditsModal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <div class="modal-icon" style="color:var(--warning);"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 18V6"/></svg></div>
      <h3>Insufficient Credits</h3>
      <p>You don't have enough credits to submit. Please add balance.</p>
      <p class="whatsapp-link">Contact on WhatsApp: <a href="https://wa.me/92154585622" target="_blank">+92154585622</a></p>
      <div class="modal-actions">
        <button class="btn-primary" onclick="document.getElementById('noCreditsModal').style.display='none'">Close</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="ocrProcessor.js"></script>
  <script type="module" src="dashboard.js"></script>
</body>
</html>
