<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eze-ho - Admin Panel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="app-body">

  <header class="app-header admin-header">
    <div class="header-brand">
      <span class="logo-icon">📦</span>
      <span class="brand-name">Eze-ho <span class="admin-badge">Admin</span></span>
    </div>
    <div class="header-right" style="display: flex; align-items: center; gap: 15px;">
      <span id="activeOcrBadge" style="background: var(--surface2); color: var(--text); padding: 4px 10px; border-radius: 6px; font-size: 0.85rem; font-weight: 500; border: 1px solid var(--border);">OCR: Loading...</span>
      <button class="btn-logout" onclick="handleLogout()">Logout</button>
    </div>
  </header>

  <div class="admin-tabs">
    <button class="admin-tab active" onclick="switchTab('submissions', this)">📋 Submissions</button>
    <button class="admin-tab" onclick="switchTab('users', this)">👥 Users</button>
    <button class="admin-tab" onclick="switchTab('ocr', this)">⚙️ OCR Settings</button>
  </div>

  <main class="app-main">
    <section id="tab-submissions">
      <div class="card">
        <h2>All Submissions</h2>
        <div class="filter-row">
          <button class="filter-btn active" onclick="filterSubs('all', this)">All</button>
          <button class="filter-btn" onclick="filterSubs('pending', this)">Pending</button>
          <button class="filter-btn" onclick="filterSubs('replied', this)">Replied</button>
        </div>
        <div id="adminSubmissionsList"><div class="loading-spinner">Loading...</div></div>
      </div>
    </section>

    <section id="tab-users" style="display:none">
      <div class="card">
        <h2>All Users</h2>
        <div id="usersList"><div class="loading-spinner">Loading...</div></div>
      </div>
    </section>

    <section id="tab-ocr" style="display:none">
      <div class="card">
        <h2>OCR Configuration</h2>
        <div class="form-group" style="max-width: 400px; margin-top: 1rem;">
          <label>Active OCR Service</label>
          <select id="activeOcrProvider" style="width:100%; padding:10px 14px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text); margin-bottom: 1rem; margin-top: 0.5rem;">
            <option value="roboflow">RoboFlow OCR</option>
            <option value="ocr.space">OCR.space</option>
          </select>
          <button class="btn-primary" id="saveOcrBtn" onclick="updateOcrProvider()">Save Configuration</button>
        </div>
      </div>
    </section>
  </main>

  <!-- Reply Modal -->
  <div id="replyModal" class="modal-overlay" style="display:none">
    <div class="modal-box wide">
      <h3>Send Reply</h3>
      <input type="hidden" id="replySubmissionId" />
      <div class="form-group">
        <label>Reply Message</label>
        <textarea id="replyMessage" rows="4" placeholder="Type your reply..."></textarea>
      </div>
      <div class="form-group">
        <label>Attach File <span style="color:var(--muted);font-weight:400">(optional)</span></label>
        <input type="file" id="replyFile" multiple accept=".jpg,.jpeg,.png,.pdf,.doc,.docx,.txt" />
      </div>
      <div id="replyProgressWrapper" class="progress-wrapper" style="display:none">
        <div class="progress-bar-track"><div class="progress-bar-fill" id="replyProgressFill"></div></div>
        <span id="replyProgressText">0%</span>
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeReplyModal()">Cancel</button>
        <button class="btn-primary" id="sendReplyBtn" onclick="sendReply()">Send Reply</button>
      </div>
    </div>
  </div>

  <!-- Credits Modal -->
  <div id="creditsModal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <h3>Manage Credits</h3>
      <input type="hidden" id="creditUserId" />
      <p id="creditUserName" style="margin-bottom:10px;font-weight:600;color:var(--text)"></p>
      <div class="form-row">
        <div class="form-group">
          <label>Action</label>
          <select id="creditAction" style="width:100%; padding:10px 14px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text);">
            <option value="add">Add (+)</option>
            <option value="remove">Remove (-)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Amount</label>
          <input type="number" id="creditAmount" min="1" value="10" />
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeCreditsModal()">Cancel</button>
        <button class="btn-primary" onclick="updateCredits()">Update Credits</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="ocrProcessor.js"></script>
  <script type="module" src="admin.js"></script>
</body>
</html>
